apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
{{- with .Values.imagePullSecrets }}
# Pull secrets on the ServiceAccount are inherited by every pod that uses it, so the controller
# Deployment does not need to declare them separately.
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}

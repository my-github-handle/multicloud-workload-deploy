# terraform-docs config for the Layer-3 Terraform modules and the live root.
# Generates a Providers/Inputs/Outputs/Resources table into each README.md between the
# BEGIN_TF_DOCS / END_TF_DOCS markers (mode: inject), so a hand-written overview above the markers
# is preserved. Run via the pre-commit hook, or:
#   terraform-docs -c .terraform-docs.yml <module-dir>
# Follows the c3-e/terraform-c3-aws conventions (inject mode, header-from main.tf, sort by name).
formatter: "markdown table"

version: ""

header-from: main.tf
footer-from: ""

recursive:
  enabled: false

sections:
  hide: []
  show: []

content: ""

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: name

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true

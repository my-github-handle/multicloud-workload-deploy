# Bill of Materials (BOM) — the product release unit.
#
# One BOM pins every artifact of a release to an IMMUTABLE coordinate so a customer
# (or a marketplace listing) consumes the product as a single versioned thing:
# install/upgrade/support/entitlement all key on this one version. Generated by
# `mage release:bom VERSION=vX.Y.Z`; the {{...}} placeholders are filled at build.
#
# Marketplace note: listings reference images by DIGEST (not tag) and require the
# artifacts in the marketplace's own registry + an entitlement/metering call in the
# operator. Those per-cloud publish steps mirror these same digests; this BOM is
# the cloud-neutral source of truth they consume.
product: multicloud-workload-deploy
version: {{VERSION}}
created: {{TIMESTAMP}}

artifacts:
  operatorImage:
    repository: {{IMAGE_REPO}}
    tag: {{VERSION}}
    digest: {{IMAGE_DIGEST}}          # sha256:… — the immutable reference
  charts:
    workload-operator:
      ref: {{CHART_OPERATOR_REF}}      # oci://…/charts/workload-operator
      version: {{CHART_VERSION}}
      digest: {{CHART_OPERATOR_DIGEST}}
    workload:
      ref: {{CHART_WORKLOAD_REF}}
      version: {{CHART_VERSION}}
      digest: {{CHART_WORKLOAD_DIGEST}}
  terraformModules:
    ref: {{TF_MODULES_REF}}            # git::…//modules
    tag: {{VERSION}}

compatibility:
  kubernetes: ">=1.30 <=1.34"
  terraform: ">=1.7"

provenance:
  signing: cosign                      # image + charts signed; verify with `cosign verify`
  sbom: {{SBOM_FILE}}                  # SPDX/CycloneDX SBOM for the operator image
  signatures:
    operatorImage: {{IMAGE_SIG}}
    sbom: {{SBOM_SIG}}

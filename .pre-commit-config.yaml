---
repos:
  - repo: https://github.com/norwoodj/helm-docs
    rev: "v1.14.2"
    hooks:
      - id: helm-docs
        files: charts/.*/(README\.md|Chart\.yaml|values\.yaml)$
        args:
          - --chart-search-root=charts
          - --sort-values-order=file

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict

      # Common errors
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
              charts/.*/crds/|
              operator/config/|
              operator/internal/render/testdata/
          ).*$
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: |
          (?x)^(
              charts/.*/crds/|
              operator/config/|
              operator/internal/render/testdata/
          ).*$
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-symlinks

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: detect-private-key

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports

  # YAML lint for charts and CI (kubernetes/helm friendly config in .yamllint).
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint]
        exclude: |
          (?x)^(
              charts/.*/templates/|
              charts/.*/crds/|
              operator/config/|
              operator/internal/render/testdata/
          ).*$

  # Terraform: format, validate, lint, security-scan, and inject terraform-docs tables.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.4
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
      # trivy is the supported successor to tfsec for IaC security scanning (tfsec is deprecated
      # and its older parser rejects Terraform `check` blocks).
      - id: terraform_trivy
      - id: terraform_docs
        # Inject into the README of every dir that has one (config in .terraform-docs.yml).
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=false
          - --args=--config=.terraform-docs.yml

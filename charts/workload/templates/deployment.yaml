apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  # replicas is intentionally omitted: the HPA owns the replica count. Setting it here would make
  # the operator fight the autoscaler (reset to a fixed value every reconcile). Kubernetes
  # defaults a new Deployment to 1 replica; the HPA scales it between min and max thereafter.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "workload.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- if .Values.podSecurityContext }}
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- else }}
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        {{- end }}
      containers:
        - name: workload
          image: {{ .Values.image | quote }}
          ports:
            - containerPort: {{ .Values.port }}
          securityContext:
            {{- if .Values.securityContext }}
            {{- toYaml .Values.securityContext | nindent 12 }}
            {{- else }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            {{- end }}
          {{- with .Values.livenessProbe }}
          {{- if .path }}
          livenessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
          {{- end }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          {{- if .path }}
          readinessProbe:
            httpGet:
              path: {{ .path }}
              port: {{ .port }}
          {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

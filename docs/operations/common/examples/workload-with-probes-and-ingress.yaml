# Workload with health probes, resource requests/limits, and an Ingress.
# Requires an ingress controller and the named IngressClass on the cluster.
apiVersion: workload.ops.dev/v1
kind: Workload
metadata:
  name: web
  namespace: default
spec:
  image: ghcr.io/example/web:1.0
  port: 8080
  autoscale:
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilization: 65
  livenessProbe:
    path: /healthz
    port: 8080
  readinessProbe:
    path: /ready
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ingressClass: nginx
  ingress:
    host: web.example.com
    path: /
    pathType: Prefix
